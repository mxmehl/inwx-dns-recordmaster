name: Test suites

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # Test using the tool via uv on different OSes and python versions
  test-os-python-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 10
      # do not abort the whole test job if one combination in the matrix fails
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-22.04]
        include:
          - python-version: "3.10"
            os: macos-latest
          - python-version: "3.10"
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/uvbuild
        with:
          python: ${{ matrix.python-version }}
          uv_args: --no-dev
      - name: Execute inwx-dns-recordmaster
        run: uv run inwx-dnsrm --help


  # Test building the package and installing it via pip3
  test-build-install:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Build package
        run: uv build
      - name: Install package
        run: pip3 install dist/inwx_dns_recordmaster-*.tar.gz
      - name: Run package
        run: |
          inwx-dnsrm --version
          inwx-dnsrm --help

  # Run functional tests against the INWX test instance
  live-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/uvbuild
        with:
          uv_args: --no-dev

      - name: Create app configuration
        run: |
          mkdir -p /home/runner/.config/inwx-dns-recordmaster
          cp tests/config.toml /home/runner/.config/inwx-dns-recordmaster/config.toml
          # Replace secrets in app config
          sed -i "s|__INWX_OTE_USER__|${{ secrets.INWX_OTE_USER }}|" /home/runner/.config/inwx-dns-recordmaster/config.toml
          sed -i "s|__INWX_OTE_PASS__|${{ secrets.INWX_OTE_PASS }}|" /home/runner/.config/inwx-dns-recordmaster/config.toml

      - name: Run with first records configuration
        run: uv run inwx-dnsrm sync -c tests/records1/

      - name: Run with second records configuration
        run: uv run inwx-dnsrm sync -c tests/records2/

      - name: Convert the remote records to YAML
        run: |
          uv run inwx-dnsrm convert -d test-mehl.mx

  # Quality checks
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/uvbuild
      - name: Lint with ruff
        run: uv run ruff check
  ty:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/uvbuild
      - name: Test typing with ty
        run: uv run ty check

  # REUSE
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check REUSE Compliance
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
