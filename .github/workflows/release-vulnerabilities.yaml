name: Vulnerability Check of Latest Release/Tag

on:
  workflow_dispatch:  # allow to trigger manually
  schedule:
    - cron: "35 9 * * 1"  # run a check once a week

permissions:
  contents: read

jobs:
  osv-check:
    runs-on: ubuntu-latest
    if: github.repository == 'mxmehl/inwx-dns-recordmaster'
    steps:
      - uses: mxmehl/latest-release-vulnerability-status@913ecf07fa07d1278ca711791342c56c3a09fec4 # v1.2.3
